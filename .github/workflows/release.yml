name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync versions
        run: |
          npm pkg set version="${{ steps.version.outputs.version }}"
          node scripts/sync-version.js

      - name: Build
        run: npm run build

      - name: Write install marker
        run: |
          echo '{
            "repo": "jarrodmedrano/slopsmith-triad-lab",
            "url": "https://github.com/jarrodmedrano/slopsmith-triad-lab",
            "branch": "main",
            "sha": "${{ github.sha }}",
            "installed_at": '"$(date +%s)"'
          }' > .slopsmith-installed.json

      - name: Create zip package
        run: zip triad_lab-${{ steps.version.outputs.version }}.zip plugin.json screen.html screen.js routes.py .slopsmith-installed.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json plugin.json screen.html screen.js
          git diff --cached --quiet || git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: triad_lab-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          make_latest: true
