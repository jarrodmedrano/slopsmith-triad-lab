name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update plugin.json version
        run: |
          jq --arg ver "${{ steps.version.outputs.version }}" '.version = $ver' plugin.json > plugin.json.tmp
          mv plugin.json.tmp plugin.json

      - name: Create zip package
        run: zip triad_lab-${{ steps.version.outputs.version }}.zip plugin.json screen.html screen.js routes.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: triad_lab-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          make_latest: true
